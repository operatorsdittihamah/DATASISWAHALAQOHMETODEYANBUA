<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Siswa SDIT Tihamah</title>

<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/4.0.1/css/fixedHeader.dataTables.css">
<link rel="stylesheet" href="https://cdn.datatables.net/2.1.5/css/dataTables.dataTables.css"/>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    background-image: url('bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.container {
    position: relative;
    max-width: 95%;
    margin: 50px auto;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgb(4, 255, 58);
    text-align: center;
    overflow: hidden;
    background: transparent;
}

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(rgba(255, 255, 255, 0.5), rgba(255,255,255,0.9)),
        url('BT.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    z-index: 0;
}

.container > * {
    position: relative;
    z-index: 1;
}

.logo {
    width: 100px;
}

h1 {
    margin-bottom: 20px;
}

table.dataTable tbody tr:hover {
    background-color: #b1faaa !important;
}

div.dataTables_wrapper {
    overflow-x: auto;
}

/* STAT BOX */
.stats-box {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.stat {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    padding: 12px;
    border-radius: 12px;
    font-weight: bold;
}

/* STAT TABLE */
.stat-table {
    background: white;
    border-radius: 10px;
    padding: 10px;
    margin: 10px auto;
    width: 95%;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    font-size: 12px;
}

#statGuru .stat-table {
    max-height: 200px;
    overflow-y: auto;
}
    

.stat-table table {
    width: 100%;
    border-collapse: collapse;
}

.stat-table th, .stat-table td {
    border: 1px solid #ddd;
    padding: 5px;
    text-align: center;
}

.stat-title {
    font-weight: bold;
    margin-bottom: 5px;
}






/* POPUP GAMBAR */
.popup-img {
    position: absolute;
    top: 20px;
    width: 200px;
    cursor: pointer;
    z-index: 2;

    animation: float 3s ease-in-out infinite;
}

/* POSISI */
.popup-img.left {
    left: 20px;

}

.popup-img.right {
    right: 20px;
}

/* ANIMASI NAIK TURUN */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* EFEK HOVER */
.popup-img:hover {
    transform: scale(1.1);
}

/* MODAL ZOOM */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    inset: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 80%;
    border-radius: 15px;
}











/* CAHAYA DI BELAKANG GAMBAR */
.popup-img {
    position: absolute;
    top: 20px;
    width: 200px;
    cursor: pointer;
    z-index: 2;

    animation: float 3s ease-in-out infinite;

    /* Glow utama */
    filter: drop-shadow(0 0 10px #f505f5)
            drop-shadow(0 0 20px #f505f5)
            drop-shadow(0 0 30px #f7f7f7);
}

/* Efek berkedip (pulse glow) */
.popup-img::after {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,200,0.4), transparent 70%);
    z-index: -1;
    animation: glowPulse 2s infinite;
}

@keyframes glowPulse {
    0% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 0.6; }
}







@media (max-width: 768px) {
    #statGuru .stat-table {
        max-height: 150px;
    }
}





.stat {
    font-size: 12px;
    padding: 8px;
}

.stat-table {
    font-size: 11px;
}

</style>
</head>

<body>

<div class="container">

<img src="LOGO SDIT 2023.png" class="logo">


 <!-- POPUP GAMBAR KIRI -->
<img src="POP.png" class="popup-img left" onclick="zoomImage(this)">

<!-- POPUP GAMBAR KANAN -->
<img src="POP.png" class="popup-img right" onclick="zoomImage(this)">

<h1>DAFTAR HALAQOH YANBU'A SISWA SDIT TIHAMAH</h1>

<!-- STATISTIK UTAMA -->
<div class="stats-box">
    <div class="stat">Jilid 1: <span id="j1">0</span></div>
    <div class="stat">Jilid 2: <span id="j2">0</span></div>
    <div class="stat">Jilid 3: <span id="j3">0</span></div>
    <div class="stat">Jilid 4: <span id="j4">0</span></div>
    <div class="stat">Jilid 5: <span id="j5">0</span></div>
    <div class="stat">Jilid 6: <span id="j6">0</span></div>
    <div class="stat">Jilid 7: <span id="j7">0</span></div>
    <div class="stat">Al Qur'an: <span id="alq">0</span></div>
</div>

<!-- TAMBAHAN -->
<div id="statKelas"></div>
<div id="statGuru"></div>

<table id="pizzaPrice" class="display" style="width:100%">
<thead>
<tr>
<th>No</th> <!-- 🔥 TAMBAHAN -->
<th>Nama Siwa</th>
<th>Jenis Kelamin</th>
<th>Jilid 1</th>
<th>Jilid 2</th>
<th>Jilid 3</th>
<th>Jilid 4</th>
<th>Jilid 5</th>
<th>Jilid 6</th>
<th>Jilid 7</th>
<th>Al Qur'an</th>
<th>Guru</th>
<th>Kelas</th>
</tr>
</thead>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>
<script src="https://cdn.datatables.net/fixedheader/4.0.1/js/dataTables.fixedHeader.js"></script>

<script>
new DataTable('#pizzaPrice', {
    ajax: {
        url: 'https://script.google.com/macros/s/AKfycbxXMgnMSERpNZGXoqj_atpIButuiXakuz_5vaE8jc-O14yX9LRunlBK4AHtH1ouXdCj/exec',
        dataSrc: function(json) {
            hitungJilid(json.data);
            return json.data;
        }
    },
    scrollX: true,
    scrollY: "70vh",
    fixedHeader: true,
    pageLength: 1000,
    paging: false,

    columns: [
    {
        data: null,
        render: function (data, type, row, meta) {
            return meta.row + 1;
        }
    },
    { data: 'nama siswa' },
    { data: 'jenis kelamin' },
    { data: 'jilidsatu' },
    { data: 'jiliddua' },
    { data: 'jilidtiga' },
    { data: 'jilidempat' },
    { data: 'jilidlima' },
    { data: 'jilidenam' },
    { data: 'jilidtujuh' },
    { data: 'alquran' },
    { data: 'guru' },
    { data: 'kelas' }
]
});


// 🔥 NOMOR OTOMATIS
table.on('draw.dt', function () {
    let pageInfo = table.page.info();
    table.column(0, { page: 'current' }).nodes().each(function (cell, i) {
        cell.innerHTML = pageInfo.start + i + 1;
    });
});

function hitungJilid(data) {

let j1=0,j2=0,j3=0,j4=0,j5=0,j6=0,j7=0,alq=0;

let kelasMap = {};
let guruMap = {};

data.forEach(row => {

    if (row.jilidsatu) j1++;
    if (row.jiliddua) j2++;
    if (row.jilidtiga) j3++;
    if (row.jilidempat) j4++;
    if (row.jilidlima) j5++;
    if (row.jilidenam) j6++;
    if (row.jilidtujuh) j7++;
    if (row.alquran) alq++;

    let kelas = row.kelas || "-";
    let guru = row.guru || "-";

    if (!kelasMap[kelas]) {
        kelasMap[kelas] = {j1:0,j2:0,j3:0,j4:0,j5:0,j6:0,j7:0,alq:0};
    }

    if (row.jilidsatu) kelasMap[kelas].j1++;
    if (row.jiliddua) kelasMap[kelas].j2++;
    if (row.jilidtiga) kelasMap[kelas].j3++;
    if (row.jilidempat) kelasMap[kelas].j4++;
    if (row.jilidlima) kelasMap[kelas].j5++;
    if (row.jilidenam) kelasMap[kelas].j6++;
    if (row.jilidtujuh) kelasMap[kelas].j7++;
    if (row.alquran) kelasMap[kelas].alq++;

    if (!guruMap[guru]) guruMap[guru]=0;
    guruMap[guru]++;
});

document.getElementById("j1").innerText=j1;
document.getElementById("j2").innerText=j2;
document.getElementById("j3").innerText=j3;
document.getElementById("j4").innerText=j4;
document.getElementById("j5").innerText=j5;
document.getElementById("j6").innerText=j6;
document.getElementById("j7").innerText=j7;
document.getElementById("alq").innerText=alq;

/* TABEL KELAS */
let htmlKelas = `<div class="stat-table">
<div class="stat-title">Statistik Per Kelas</div>
<table><tr>
<th>Kelas</th><th>Jilid 1</th><th>Jilid 2</th><th>Jilid 3</th>
<th>Jilid 4</th><th>Jilid 5</th><th>Jilid 6</th><th>Jilid 7</th><th>Al Qur'an</th></tr>`;

for (let k in kelasMap){
let d=kelasMap[k];
htmlKelas += `<tr>
<td>${k}</td>
<td>${d.j1}</td>
<td>${d.j2}</td>
<td>${d.j3}</td>
<td>${d.j4}</td>
<td>${d.j5}</td>
<td>${d.j6}</td>
<td>${d.j7}</td>
<td>${d.alq}</td>
</tr>`;
}

htmlKelas += "</table></div>";
document.getElementById("statKelas").innerHTML = htmlKelas;

/* TABEL GURU */
let htmlGuru = `<div class="stat-table">
<div class="stat-title">Jumlah Siswa per Guru</div>
<table><tr><th>Guru</th><th>Jumlah</th></tr>`;

for (let g in guruMap){
htmlGuru += `<tr><td>${g}</td><td>${guruMap[g]}</td></tr>`;
}

htmlGuru += "</table></div>";
document.getElementById("statGuru").innerHTML = htmlGuru;

}




</script>

</body>
</html>
